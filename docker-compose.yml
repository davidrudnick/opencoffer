services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opencoffer
      POSTGRES_PASSWORD: opencoffer
      POSTGRES_DB: opencoffer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencoffer"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://opencoffer:opencoffer@postgres:5432/opencoffer
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"ok\":true'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://opencoffer:opencoffer@postgres:5432/opencoffer
    command: ["node", "--import", "tsx", "src/worker/index.ts"]

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  pgdata: {}
  ollama: {}
